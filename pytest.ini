[pytest]
pythonpath = .
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=50
markers =
    unit: Unit tests
    integration: Integration tests that test component interactions (run with: pytest tests/integration/ -m integration --no-cov)
    slow: Slow tests that require external services or large models
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
