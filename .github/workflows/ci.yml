name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            --no-header \
            -p no:warnings
        env:
          # Dummy keys so config validation doesn't fail (no real API calls made)
          GROQ_API_KEY: "dummy-key-for-ci"
          OPENAI_API_KEY: "dummy-key-for-ci"
          LANGSMITH_API_KEY: "dummy-key-for-ci"

      - name: Upload unit test coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-report
          path: coverage.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests  # Only runs if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -v \
            -m integration \
            --no-cov \
            --no-header \
            -p no:warnings
        env:
          # Dummy keys so config validation doesn't fail (no real API calls made)
          GROQ_API_KEY: "dummy-key-for-ci"
          OPENAI_API_KEY: "dummy-key-for-ci"
          LANGSMITH_API_KEY: "dummy-key-for-ci"
