name: CD - Delivery Summary

on:
  push:
    branches: [ main ]

jobs:
  delivery:
    name: Delivery Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run all tests and generate combined report
        run: |
          uv run pytest tests/unit/ tests/integration/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=45 \
            --no-header \
            -p no:warnings
        env:
          GROQ_API_KEY: "dummy-key-for-ci"
          OPENAI_API_KEY: "dummy-key-for-ci"
          LANGSMITH_API_KEY: "dummy-key-for-ci"

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Print delivery summary
        run: |
          echo "========================================="
          echo "  ✅ Medical-RAG-Chatbot Delivery Summary"
          echo "========================================="
          echo "  Branch : main"
          echo "  Commit : ${{ github.sha }}"
          echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Status : All checks passed"
          echo "========================================="

  deploy:
    name: Deploy to Google Cloud Run
    needs: delivery
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy medical-chatbot \
            --source . \
            --project ${{ secrets.GCP_PROJECT }} \
            --region ${{ secrets.GCP_REGION }} \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars="STREAMLIT_SERVER_PORT=8080,STREAMLIT_SERVER_ADDRESS=0.0.0.0,STREAMLIT_SERVER_HEADLESS=true,STREAMLIT_SERVER_ENABLE_CORS=false,STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false,STREAMLIT_SERVER_ENABLE_WEBSOCKET_COMPRESSION=false"

