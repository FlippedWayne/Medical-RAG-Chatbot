name: CD - Delivery Summary

on:
  push:
    branches: [ main ]

jobs:
  delivery:
    name: Delivery Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run all tests and generate combined report
        run: |
          uv run pytest tests/unit/ tests/integration/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            --no-header \
            -p no:warnings
        env:
          GROQ_API_KEY: "dummy-key-for-ci"
          OPENAI_API_KEY: "dummy-key-for-ci"
          LANGSMITH_API_KEY: "dummy-key-for-ci"

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Print delivery summary
        run: |
          echo "========================================="
          echo "  ✅ Medical-RAG-Chatbot Delivery Summary"
          echo "========================================="
          echo "  Branch : main"
          echo "  Commit : ${{ github.sha }}"
          echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Status : All checks passed"
          echo "========================================="
